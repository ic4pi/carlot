<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light">
<title>Change Password — Auto Mart Staff</title>
<link rel="icon" href="/assets/fav.JPEG" type="image/jpeg">
<link rel="apple-touch-icon" href="/assets/fav.JPEG">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--navy:#2C3E6B;--navy-2:#3D527A;--gray:#6B7280;--border:#E2E5EA;--white:#fff;--bg-soft:#F6F7F9;--orange:#E8772E;--radius:10px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg-soft);color:#1B2A4D;min-height:100vh;}
  header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 20px;}
  header h1{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;}
  main{max-width:480px;margin:0 auto;padding:24px 20px 40px;}
  .card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--navy-2);margin-bottom:6px;}
  .field input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:14px;font-size:16px;}
  .btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;}
  .btn-primary{background:var(--orange);color:#fff;}
  .btn-back{background:var(--white);border:1.5px solid var(--border);color:var(--navy);text-align:center;text-decoration:none;margin-top:12px;}
  .msg{font-size:13px;margin-top:10px;min-height:18px;}
  .msg.ok{color:#166534;}.msg.err{color:#B45309;}
</style>
</head>
<body>

<header><h1>Change Password</h1></header>

<main id="main" style="display:none">
  <div class="card">
    <form id="form-password">
      <div class="field"><label>Current password</label><input type="password" id="current" required autocomplete="current-password"></div>
      <div class="field"><label>New password</label><input type="password" id="new-password" required minlength="6" autocomplete="new-password"></div>
      <button type="submit" class="btn btn-primary">Update password</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>
  <a href="/staff/" class="btn btn-back">← Back to staff</a>
</main>

<script src="/staff/auth.js"></script>
<script>
  CarlotAuth.requireAuth().then((session) => {
    if (session) document.getElementById('main').style.display = 'block';
  });

  document.getElementById('form-password').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('msg');
    msg.className = 'msg';
    try {
      const res = await fetch('/api/auth/change-password', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${CarlotAuth.getToken()}`
        },
        body: JSON.stringify({
          currentPassword: document.getElementById('current').value,
          newPassword: document.getElementById('new-password').value,
          targetRole: 'admin'
        })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Failed');
      msg.textContent = 'Password updated.';
      msg.classList.add('ok');
      e.target.reset();
    } catch (err) {
      msg.textContent = err.message;
      msg.classList.add('err');
    }
  });
</script>
</body>
</html>
