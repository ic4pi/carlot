<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light">
<title>Staff — Auto Mart of Flowood</title>
<link rel="icon" href="/assets/fav.JPEG" type="image/jpeg">
<link rel="apple-touch-icon" href="/assets/fav.JPEG">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--navy:#2C3E6B;--navy-2:#3D527A;--navy-deep:#1B2A4D;--gray:#6B7280;--border:#E2E5EA;--white:#fff;--bg-soft:#F6F7F9;--orange:#E8772E;--radius:10px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg-soft);color:var(--navy-deep);min-height:100vh;}
  header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;}
  header h1{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;}
  header p{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--navy-2);margin-top:4px;}
  .logout-btn{background:none;border:none;color:var(--gray);font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;}
  main{max-width:480px;margin:0 auto;padding:24px 20px 40px;}
  .card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
  .stat{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gray);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
  .stat-val{font-family:'Sora',sans-serif;font-size:32px;font-weight:800;color:var(--navy);}
  .btn{display:flex;align-items:center;justify-content:center;width:100%;padding:18px;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;text-decoration:none;cursor:pointer;margin-bottom:12px;}
  .btn-primary{background:var(--orange);color:#fff;}
  .btn-secondary{background:var(--white);color:var(--navy);border:1.5px solid var(--border);}
  .btn-ghost{background:transparent;color:var(--navy-2);border:1.5px solid var(--border);font-size:14px;padding:14px;}
  .steps{font-size:13px;color:var(--gray);line-height:1.6;}
  .hidden{display:none !important;}
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 20px;}
  .login-box{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:28px 24px;width:100%;max-width:380px;}
  .login-box h2{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px;}
  .login-box .sub{font-size:14px;color:var(--gray);margin-bottom:22px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--navy-2);margin-bottom:6px;}
  .field input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:14px;font-size:16px;}
  .error{color:#B45309;font-size:13px;margin-top:10px;min-height:18px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>Staff Area</h2>
    <p class="sub">Auto Mart of Flowood</p>
    <form id="login-form">
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter staff password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="margin-bottom:0">Enter</button>
      <div class="error" id="login-error"></div>
    </form>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <div>
      <h1>Staff</h1>
      <p>Auto Mart of Flowood</p>
      <button class="logout-btn" type="button" id="logout-btn">Sign out</button>
    </div>
  </header>

  <main>
    <div class="card">
      <div class="stat">Vehicles listed</div>
      <div class="stat-val" id="count">—</div>
    </div>

    <a href="/add-car.html" class="btn btn-primary">+ Add Vehicle</a>
    <a href="/" class="btn btn-secondary">View Public Site →</a>
    <a href="/staff/settings.html" class="btn btn-ghost">Change Password</a>

    <div class="card steps">
      <b>Add a car in 4 steps:</b><br>
      1. Scan VIN barcode<br>
      2. Confirm details + price<br>
      3. Take photos<br>
      4. Submit to inventory
    </div>
  </main>
</div>

<script src="/staff/auth.js"></script>
<script>
  const loginScreen = document.getElementById('login-screen');
  const app = document.getElementById('app');

  function showApp() {
    loginScreen.classList.add('hidden');
    app.classList.remove('hidden');
    loadCount();
  }

  function showLogin() {
    loginScreen.classList.remove('hidden');
    app.classList.add('hidden');
  }

  async function loadCount() {
    try {
      const r = await fetch('/api/vehicles');
      const data = await r.json();
      document.getElementById('count').textContent = Array.isArray(data) ? data.length : '0';
    } catch {
      document.getElementById('count').textContent = '—';
    }
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('login-error').textContent = '';
    try {
      await CarlotAuth.login(document.getElementById('login-password').value);
      showApp();
      const next = new URLSearchParams(location.search).get('next');
      if (next) location.href = next;
    } catch (err) {
      document.getElementById('login-error').textContent = err.message || 'Wrong password';
    }
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    CarlotAuth.logout();
    showLogin();
    document.getElementById('login-password').value = '';
  });

  CarlotAuth.verify().then((s) => s ? showApp() : showLogin());
</script>
</body>
</html>
