<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light">
<title>Password Settings — Auto Mart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--navy:#2C3E6B;--navy-2:#3D527A;--gray:#6B7280;--border:#E2E5EA;--white:#fff;--bg-soft:#F6F7F9;--orange:#E8772E;--radius:10px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg-soft);color:#1B2A4D;min-height:100vh;}
  header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 20px;}
  header h1{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;}
  header p{font-size:13px;color:var(--gray);margin-top:4px;}
  main{max-width:480px;margin:0 auto;padding:24px 20px 40px;}
  .card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
  .card h2{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;margin-bottom:14px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--navy-2);margin-bottom:6px;}
  .field input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:14px;font-size:16px;}
  .btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;margin-top:6px;}
  .btn-primary{background:var(--orange);color:#fff;}
  .btn-back{background:var(--white);border:1.5px solid var(--border);color:var(--navy);text-align:center;text-decoration:none;margin-top:12px;}
  .msg{font-size:13px;margin-top:10px;min-height:18px;}
  .msg.ok{color:#166534;}.msg.err{color:#B45309;}
  .note{font-size:12px;color:var(--gray);line-height:1.5;margin-top:12px;}
</style>
</head>
<body>

<header>
  <h1>Password Settings</h1>
  <p>Manager access only</p>
</header>

<main id="main" style="display:none">
  <div class="card">
    <h2>Change manager password</h2>
    <form id="form-admin">
      <div class="field"><label>Current manager password</label><input type="password" id="admin-current" required autocomplete="current-password"></div>
      <div class="field"><label>New manager password</label><input type="password" id="admin-new" required minlength="6" autocomplete="new-password"></div>
      <button type="submit" class="btn btn-primary">Update manager password</button>
      <div class="msg" id="msg-admin"></div>
    </form>
  </div>

  <div class="card">
    <h2>Change or reset staff password</h2>
    <form id="form-staff">
      <div class="field"><label>Your manager password (to confirm)</label><input type="password" id="staff-admin" required autocomplete="current-password"></div>
      <div class="field"><label>New staff password</label><input type="password" id="staff-new" required minlength="6" autocomplete="new-password"></div>
      <button type="submit" class="btn btn-primary">Update staff password</button>
      <div class="msg" id="msg-staff"></div>
    </form>
    <p class="note">Staff password only allows adding vehicles — not changing passwords.</p>
  </div>

  <a href="#" id="back-link" class="btn btn-back">← Back to dashboard</a>
</main>

<script src="/dash/auth.js"></script>
<script>
  document.getElementById('back-link').href = CarlotAuth.dashHome();

  async function apiPost(url, body) {
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${CarlotAuth.getToken()}`
      },
      body: JSON.stringify(body)
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  CarlotAuth.requireAuth({ adminOnly: true }).then((session) => {
    if (!session) return;
    document.getElementById('main').style.display = 'block';
  });

  document.getElementById('form-admin').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('msg-admin');
    msg.className = 'msg';
    try {
      await apiPost('/api/auth/change-password', {
        currentPassword: document.getElementById('admin-current').value,
        newPassword: document.getElementById('admin-new').value,
        targetRole: 'admin'
      });
      msg.textContent = 'Manager password updated.';
      msg.classList.add('ok');
      e.target.reset();
    } catch (err) {
      msg.textContent = err.message;
      msg.classList.add('err');
    }
  });

  document.getElementById('form-staff').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('msg-staff');
    msg.className = 'msg';
    try {
      await apiPost('/api/auth/reset-staff', {
        adminPassword: document.getElementById('staff-admin').value,
        newStaffPassword: document.getElementById('staff-new').value
      });
      msg.textContent = 'Staff password updated.';
      msg.classList.add('ok');
      e.target.reset();
    } catch (err) {
      msg.textContent = err.message;
      msg.classList.add('err');
    }
  });
</script>
</body>
</html>
